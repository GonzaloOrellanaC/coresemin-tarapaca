name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version file
        run: |
          echo "versions/VERSION contents:"
          cat versions/VERSION || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build
        run: |
          npm run build

      - name: Verify build
        run: |
          echo "Build completed."
